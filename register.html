<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Register</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, var(--bg-surface) 0%, var(--bg-primary) 100%);">
  
  <div class="auth-card" style="max-width: 480px;">
    <div class="auth-header text-center mb-4">
      <a href="index.html" class="logo justify-center" style="font-size: 1.5rem; color: var(--text-primary); text-decoration: none;">
        <div class="logo-icon">TX</div>
        <span>TradeX AI</span>
      </a>
      <h2 class="mt-3">Create Account</h2>
      <p class="text-muted mt-1">Join the terminal that completely changes your edges.</p>
    </div>

    <form id="register-form">
      <div class="form-group mb-3">
        <label class="form-label text-muted">Username</label>
        <div style="position: relative;">
          <i class="fas fa-user" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-muted)"></i>
          <input type="text" id="reg-username" class="form-control" style="padding-left: 2.5rem;" placeholder="Choose a username" required>
        </div>
      </div>
      
      <div class="form-group mb-3">
        <label class="form-label text-muted">Email Address (Optional)</label>
        <div style="position: relative;">
          <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-muted)"></i>
          <input type="email" id="reg-email" class="form-control" style="padding-left: 2.5rem;" placeholder="demo@tradex.ai">
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label text-muted">Password</label>
        <div style="position: relative;">
          <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-muted)"></i>
          <input type="password" id="reg-password" class="form-control" style="padding-left: 2.5rem;" placeholder="Create password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
        <span>Create Account</span>
        <i class="fas fa-user-plus ml-2"></i>
      </button>
    </form>

    <div class="auth-footer text-center mt-4">
      <p class="text-muted">Already have an account? <a href="login.html" class="text-white fw-bold" style="color: var(--text-primary) !important; text-decoration: underline;">Log In</a></p>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('register-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('reg-username').value.trim();
        const p = document.getElementById('reg-password').value.trim();
        
        if (u.length < 3 || p.length < 5) {
            Core.showToast('Username min 3 char, Password min 5 char.', 'error');
            return;
        }

        if (Core.register(u, p)) {
          Core.showToast('Registration successful! Please login.', 'success');
          // NO AUTO REDIRECT as per SPEC requirement "register.html: NO auth redirect at all"
          document.getElementById('register-form').reset();
        } else {
          Core.showToast('Username already exists.', 'error');
        }
      });
    });
  </script>
</body>
</html>
