<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar Injected Here -->
    <div id="sidebar-container"></div>
    
    <div class="main-wrapper">
      
      <!-- Navbar Injected Here -->
      <div id="navbar-container"></div>

      <div class="page-content">
        <div class="d-flex justify-between align-center mb-4">
          <div>
            <h1 class="mb-1" id="greeting">Welcome Back</h1>
            <p class="text-muted">Here's your market overview for today.</p>
          </div>
          <div>
            <div class="badge badge-green">
              <span id="live-status-dot" style="display:inline-block; width:8px; height:8px; background:var(--accent-green); border-radius:50%; margin-right:5px; animation: pulse 2s infinite;"></span>
              Live Data Active
            </div>
            <style>@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }</style>
          </div>
        </div>

        <!-- Top Widgets Grid -->
        <div class="grid grid-4 mb-4">
          <div class="card">
            <div class="text-muted text-sm fw-bold mb-2">BITCOIN (BTC)</div>
            <div class="d-flex align-center justify-between">
              <h2 id="dash-btc-price" class="skeleton-text-short h-auto">Loading...</h2>
              <div id="dash-btc-change" class="badge">--%</div>
            </div>
          </div>
          <div class="card">
            <div class="text-muted text-sm fw-bold mb-2">ETHEREUM (ETH)</div>
            <div class="d-flex align-center justify-between">
              <h2 id="dash-eth-price" class="skeleton-text-short h-auto">Loading...</h2>
              <div id="dash-eth-change" class="badge">--%</div>
            </div>
          </div>
          <div class="card">
            <div class="text-muted text-sm fw-bold mb-2">MARKET CAP</div>
            <div class="d-flex align-center justify-between">
              <h2 id="dash-mcap" class="skeleton-text-short h-auto">Loading...</h2>
              <i class="fas fa-chart-pie text-muted text-lg"></i>
            </div>
          </div>
          <a href="fear-greed.html" class="card" style="display:block;">
            <div class="text-muted text-sm fw-bold mb-2 d-flex justify-between">
              FEAR & GREED <i class="fas fa-external-link-alt"></i>
            </div>
            <div class="d-flex align-center justify-between">
              <h2 id="dash-fng-val" class="skeleton-text-short h-auto" style="width:40px;">--</h2>
              <div id="dash-fng-label" class="badge">Loading...</div>
            </div>
            <!-- Mini bar -->
            <div class="mt-2" style="height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
              <div id="dash-fng-bar" style="height: 100%; width: 0%; transition: 1s ease;"></div>
            </div>
          </a>
        </div>

        <div class="grid grid-3 mb-4">
          
          <!-- Main Chart -->
          <div class="card" style="grid-column: span 2;">
            <div class="d-flex justify-between align-center mb-4">
              <h3 class="fw-bold"><i class="fab fa-bitcoin text-yellow mr-2"></i> Bitcoin 7D Trend</h3>
              <div class="d-flex gap-1">
                <button class="btn btn-secondary btn-sm">1H</button>
                <button class="btn btn-secondary btn-sm active">7D</button>
                <button class="btn btn-secondary btn-sm">30D</button>
              </div>
            </div>
            <div style="height: 300px; position: relative;">
               <canvas id="btcChart"></canvas>
            </div>
          </div>

          <!-- AI Market Analysis -->
          <div class="card d-flex flex-column">
            <div class="d-flex justify-between align-center mb-3">
              <h3 class="fw-bold"><i class="fas fa-robot text-green mr-2"></i> AI Market Pulse</h3>
              <button class="btn btn-secondary btn-sm" id="refresh-ai-btn" data-tooltip="Refresh Analysis">
                <i class="fas fa-sync-alt"></i>
              </button>
            </div>
            <div id="ai-pulse-content" class="flex-1 text-muted" style="overflow-y: auto; font-size: 0.95rem; line-height: 1.6;">
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text-short"></div>
            </div>
            <div class="mt-3 pt-3" style="border-top: 1px solid var(--border);">
              <a href="signals.html" class="btn btn-primary btn-block btn-sm">View Pro Signals</a>
            </div>
          </div>

        </div>

        <div class="grid grid-2">
          
          <!-- Top Movers list -->
          <div class="card">
            <h3 class="fw-bold mb-4">Top Movers (24H)</h3>
            <div id="top-movers-list">
              <div class="skeleton skeleton-text mb-2"></div>
              <div class="skeleton skeleton-text mb-2"></div>
              <div class="skeleton skeleton-text mb-2"></div>
            </div>
          </div>

          <!-- Quick Access / News -->
          <div class="card">
            <div class="d-flex justify-between align-center mb-4">
              <h3 class="fw-bold">Latest Breaking</h3>
              <a href="news.html" class="text-green text-sm">View All</a>
            </div>
            <div id="dash-news-list" class="d-flex flex-column gap-3">
              <div class="skeleton skeleton-text mb-1"></div>
              <div class="skeleton skeleton-text mb-1"></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script src="api.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
