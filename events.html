<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Macro Events</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
     .event-card {
        padding: 1.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 1rem;
        transition: transform 0.2s, border-color 0.2s;
     }
     .event-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent-blue);
     }
     
     .impact-tag {
        width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px;
     }
     .impact-high { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
     .impact-med { background: var(--accent-yellow); }
     .impact-low { background: var(--border); }
  </style>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
      <div id="navbar-container"></div>

      <div class="page-content" style="max-width: 1000px; margin: 0 auto;">
        
        <div class="d-flex justify-between align-center mb-5 flex-wrap gap-3">
          <div>
            <div class="badge badge-blue mb-2"><i class="fas fa-calendar-alt"></i> ECONOMIC CALENDAR</div>
            <h1 class="mb-1">Macro Events</h1>
            <p class="text-muted">High-impact financial releases affecting crypto volatility.</p>
          </div>
          <div class="d-flex gap-2">
             <button class="btn btn-secondary active" id="btn-filter-all">All</button>
             <button class="btn btn-secondary text-red" id="btn-filter-high"><i class="fas fa-fire mr-1"></i> High Impact</button>
          </div>
        </div>

        <div class="grid grid-3 mb-4">
           <!-- AI Warning Pane -->
           <div class="card p-0" style="grid-column: span 1; overflow:hidden;">
              <div class="p-4 bg-secondary border-bottom">
                 <h3 class="fw-bold"><i class="fas fa-brain text-blue mr-2"></i> Copilot Analysis</h3>
              </div>
              <div class="p-4" id="events-copilot-analysis">
                 <div class="text-center py-4 text-muted">
                    <i class="fas fa-circle-notch fa-spin text-2xl mb-3"></i><br>
                    Scanning upcoming events for correlation...
                 </div>
              </div>
           </div>
           
           <!-- Calendar List -->
           <div class="card" style="grid-column: span 2; padding: 1.5rem;">
               <h3 class="fw-bold mb-4">Upcoming Schedule (Simulated)</h3>
               
               <div id="events-container">
                  <!-- Generated by JS -->
                  <div class="skeleton-chart" style="height: 100px; margin-bottom: 1rem;"></div>
                  <div class="skeleton-chart" style="height: 100px; margin-bottom: 1rem;"></div>
                  <div class="skeleton-chart" style="height: 100px; margin-bottom: 1rem;"></div>
               </div>
           </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="core.js"></script>
  <script src="api.js"></script>
  <script src="events.js"></script>
</body>
</html>
