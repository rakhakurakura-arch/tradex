<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Morning Brief</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .brief-section { border-left: 3px solid var(--border); padding-left: 1.5rem; margin-bottom: 2.5rem; position: relative; }
    .brief-section::before {
       content: ''; position: absolute; left: -7px; top: 0; width: 11px; height: 11px; border-radius: 50%; background: var(--bg-surface); border: 2px solid var(--accent-green);
    }
  </style>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
      <div id="navbar-container"></div>

      <div class="page-content" style="max-width: 900px; margin: 0 auto;">
        
        <div class="d-flex justify-between align-center mb-5 flex-wrap gap-3">
          <div>
            <div class="badge badge-yellow mb-2"><i class="fas fa-sun text-yellow"></i> DAILY ALPHA</div>
            <h1 class="mb-1">Morning AI Brief</h1>
            <p class="text-muted" id="brief-date">Generating today's summary...</p>
          </div>
          <button class="btn btn-secondary" id="btn-generate-brief">
            <i class="fas fa-magic"></i> Regenerate with Latest Data
          </button>
        </div>

        <div id="brief-content-container">
           <!-- Synthesizing state -->
           <div id="brief-loading" class="card text-center py-5">
              <i class="fas fa-circle-notch fa-spin text-3xl text-green mb-4"></i>
              <h3 class="fw-bold">Groq LPU is synthesizing market data...</h3>
              <p class="text-muted mt-2">Aggregating top 100 assets, global news, and technical indicators.</p>
           </div>
           
           <!-- Content injection -->
           <div id="brief-markdown" class="markdown-body" style="display:none;"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="core.js"></script>
  <script src="api.js"></script>
  <script src="morning-brief.js"></script>
</body>
</html>
