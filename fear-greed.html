<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Fear & Greed Index</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
      <div id="navbar-container"></div>

      <div class="page-content">
        <div class="text-center mb-5">
          <div class="badge badge-blue mb-2"><i class="fas fa-tachometer-alt"></i> MARKET SENTIMENT</div>
          <h1 class="mb-1">Crypto Fear & Greed Index</h1>
          <p class="text-muted">Analyzing volatility, market momentum, social media, surveys, and dominance.</p>
        </div>

        <!-- Gauge Section -->
        <div class="card mb-4" style="max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem;">
          <div class="d-flex flex-column align-center justify-center relative">
            
            <!-- Semicircle CSS Gauge -->
            <div style="position: relative; width: 300px; height: 150px; overflow: hidden; margin-bottom: -20px;">
              <!-- Background track -->
              <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 30px solid var(--border); border-bottom-color: transparent; border-right-color: transparent; transform: rotate(45deg);"></div>
              
              <!-- Colored Segments (Static visual background) -->
              <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; opacity: 0.15;">
                <div style="position: absolute; clip-path: polygon(0 50%, 50% 50%, 50% 0, 0 0); width:100%; height:100%; background: #ff4444; border-radius:50%;"></div>
                <div style="position: absolute; clip-path: polygon(50% 50%, 100% 50%, 100% 0, 50% 0); width:100%; height:100%; background: #f59e0b; border-radius:50%;"></div>
                <div style="position: absolute; clip-path: polygon(100% 100%, 50% 100%, 50% 50%, 100% 50%); width:100%; height:100%; background: #00d4aa; border-radius:50%;"></div>
              </div>

              <!-- Animated Fill Line -->
              <div id="fng-gauge-fill" style="position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 30px solid transparent; border-top-color: var(--accent-green); border-left-color: var(--accent-green); transform: rotate(-135deg); transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;"></div>
            </div>

            <!-- Pointer Text (Per Spec IDs) -->
            <div class="text-center mt-3" style="z-index: 20;">
              <h1 id="fng-value" style="font-size: 4rem; line-height: 1; letter-spacing: -2px;">--</h1>
              <div id="fng-label" class="badge badge-green text-lg mt-2" style="font-size: 1.25rem; font-weight: 800; text-transform: uppercase;">LOADING...</div>
            </div>
            
          </div>
        </div>

        <!-- History blocks -->
        <h3 class="fw-bold mb-3 text-center">Historical Values</h3>
        <div class="grid grid-3 mb-5" style="max-width: 800px; margin: 0 auto;">
          <div class="card text-center">
             <div class="text-muted text-sm fw-bold mb-2">YESTERDAY</div>
             <h2 id="fng-hist-1" class="text-2xl skeleton-text-short h-auto mx-auto w-50">--</h2>
             <div id="fng-hist-1-label" class="text-muted mt-1 text-sm">--</div>
          </div>
          <div class="card text-center">
             <div class="text-muted text-sm fw-bold mb-2">LAST WEEK</div>
             <h2 id="fng-hist-7" class="text-2xl skeleton-text-short h-auto mx-auto w-50">--</h2>
             <div id="fng-hist-7-label" class="text-muted mt-1 text-sm">--</div>
          </div>
          <div class="card text-center">
             <div class="text-muted text-sm fw-bold mb-2">LAST MONTH</div>
             <h2 id="fng-hist-30" class="text-2xl skeleton-text-short h-auto mx-auto w-50">--</h2>
             <div id="fng-hist-30-label" class="text-muted mt-1 text-sm">--</div>
          </div>
        </div>

        <!-- 30-Day Chart -->
        <div class="card" style="max-width: 1000px; margin: 0 auto;">
           <h3 class="fw-bold mb-4">30-Day Trend</h3>
           <div style="height: 350px; position: relative;">
              <canvas id="fng-chart"></canvas>
           </div>
        </div>

      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script src="api.js"></script>
  <script src="fear-greed.js"></script>
</body>
</html>
