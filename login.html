<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, var(--bg-surface) 0%, var(--bg-primary) 100%);">
  
  <div class="auth-card">
    <div class="auth-header text-center mb-4">
      <a href="index.html" class="logo justify-center" style="font-size: 1.5rem; color: var(--text-primary); text-decoration: none;">
        <div class="logo-icon">TX</div>
        <span>TradeX AI</span>
      </a>
      <h2 class="mt-3">Welcome Back</h2>
      <p class="text-muted mt-1">Sign in to access your trading platform</p>
    </div>

    <form id="login-form">
      <div class="form-group mb-3">
        <label class="form-label text-muted">Username</label>
        <div style="position: relative;">
          <i class="fas fa-user" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-muted)"></i>
          <input type="text" id="username" class="form-control" style="padding-left: 2.5rem;" placeholder="Enter your username" required>
        </div>
      </div>
      
      <div class="form-group mb-4">
        <label class="form-label text-muted d-flex justify-between">
          Password
          <a href="#" class="text-green text-sm" onclick="alert('Demo platform: Just try registering a new account.')">Forgot?</a>
        </label>
        <div style="position: relative;">
          <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-muted)"></i>
          <input type="password" id="password" class="form-control" style="padding-left: 2.5rem;" placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
        <span>Log In</span>
        <i class="fas fa-arrow-right ml-2"></i>
      </button>
    </form>

    <div class="auth-footer text-center mt-4">
      <p class="text-muted">Don't have an account? <a href="register.html" class="text-white fw-bold" style="color: var(--text-primary) !important; text-decoration: underline;">Sign up now</a></p>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Setup dynamic auth logic overriding standard form submission
      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        if (Core.login(u, p)) {
          Core.showToast('Login successful. Redirecting...', 'success');
          // Standard delay to show toast before swap
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          Core.showToast('Invalid credentials. Please try again.', 'error');
        }
      });
    });
  </script>
</body>
</html>
