<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeX AI | Smart Alerts</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    <div id="sidebar-container"></div>
    <div class="main-wrapper">
      <div id="navbar-container"></div>

      <div class="page-content" style="max-width: 900px; margin: 0 auto;">
        
        <div class="d-flex justify-between align-center mb-5 flex-wrap gap-3">
          <div>
            <div class="badge badge-purple mb-2"><i class="fas fa-bell"></i> NOTIFICATIONS</div>
            <h1 class="mb-1">Smart Alerts</h1>
            <p class="text-muted">Set up custom price triggers and AI-driven volatility warnings.</p>
          </div>
          <button class="btn btn-primary" onclick="document.getElementById('add-alert-modal').style.display='flex'">
             <i class="fas fa-plus"></i> New Alert
          </button>
        </div>

        <div class="grid grid-3 mb-4">
           <div class="card bg-secondary border-blue">
              <h3 class="fw-bold mb-2"><i class="fas fa-robot text-blue mr-2"></i> AI Auto-Alerts</h3>
              <p class="text-sm text-muted mb-3">Let Copilot ping you when sudden market shifts occur.</p>
              <label class="switch d-inline-block">
                 <input type="checkbox" checked>
                 <span class="slider round"></span>
              </label>
           </div>
           
           <div class="card" style="grid-column: span 2;">
              <h3 class="fw-bold mb-3">Active Triggers</h3>
              <div id="alerts-container" class="d-flex flex-column gap-2">
                 <!-- JS Populated -->
                 <div class="p-4 text-center text-muted border border-dashed rounded" id="no-alerts-msg">
                    No active alerts. Click "New Alert" to configure one.
                 </div>
              </div>
           </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add Alert Modal -->
  <div id="add-alert-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:999; align-items:center; justify-content:center; padding:1rem;">
     <div class="card border" style="width:100%; max-width:400px;">
        <div class="d-flex justify-between align-center mb-4">
           <h3 class="fw-bold">Create Trigger</h3>
           <button class="btn btn-secondary btn-sm" onclick="document.getElementById('add-alert-modal').style.display='none'" style="border:none; background:transparent;">
             <i class="fas fa-times text-lg"></i>
           </button>
        </div>
        
        <form id="add-alert-form">
          <div class="form-group">
             <label class="form-label">Asset Symbol</label>
             <input type="text" id="alt-asset" class="form-control" placeholder="BTC" required>
          </div>
          <div class="form-group">
             <label class="form-label">Condition</label>
             <select id="alt-cond" class="form-control" required>
                <option value=">">Price Goes Above</option>
                <option value="<">Price Drops Below</option>
             </select>
          </div>
          <div class="form-group">
             <label class="form-label">Target Price ($)</label>
             <input type="number" id="alt-price" class="form-control" step="any" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-4">Save Alert</button>
        </form>
     </div>
  </div>

  <script src="core.js"></script>
  <script src="api.js"></script>
  <script src="alerts.js"></script>
</body>
</html>
